---
layout: default
---

<article class="product">
  <h1>{{ page.title }}</h1>
  <img src="{{ page.image }}" alt="{{ page.title }}" class="product-image" />
  <p class="price">{{ page.price | prepend: '$' }}</p>
  <div class="description">
    {{ content | markdownify }}
  </div>
  <a href="/checkout?sku={{ page.sku }}" class="btn btn-primary">Comprar</a>
</article>
